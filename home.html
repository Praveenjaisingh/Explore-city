<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore City - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <div class="container" id="homePage">
    <header class="header">
      <h1>Explore City</h1>
      <div class="user-info">
        <span id="welcomeUser">Welcome, User!</span>
        <button onclick="logout()" style="float:right;margin-bottom:10px;">Logout</button>
      </div>
    </header>

    <div class="card">
      <p>Allow location or enter manually to explore nearby places:</p>
      <div class="location-options">
        <button onclick="getLocation()">📍 Use My Location</button>
        <span>or</span>
        <input type="text" id="manualLocation" placeholder="Enter your location" />
        <button onclick="useManualLocation()">Submit Location</button>
      </div>

      <input type="text" id="searchInput" oninput="showPlaces()" placeholder="Search places..." />

      <div class="filters">
        <button onclick="filterCategory('All')">All</button>
        <button onclick="filterCategory('Hotel')">Hotels</button>
        <button onclick="filterCategory('Temple')">Temples</button>
        <button onclick="filterCategory('Hospital')">Hospitals</button>
        <button onclick="filterCategory('Mall')">Malls</button>
      </div>

      <h3>Nearby Places</h3>
      <ul class="place-list" id="placesList"></ul>
    </div>

    
    <div class="fab">
      <button onclick="toggleMapView()">🗺️</button>
    </div>

    <footer class="footer">
      <p>&copy; 2025 Explore City. All rights reserved.</p>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    function logout() {
        
        window.location.href = "logout.html"; 
    }
  </script>
</body>
</html>
