<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            width: 100%;
            padding: 40px 15px;
        }

        .container {
            max-width: 480px;
            margin: auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            padding: 35px 30px;
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #3689c0;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .divider {
            width: 50px;
            height: 3px;
            background-color: #2081db;
            margin: 15px auto 25px;
            border-radius: 2px;
        }

        p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 15px;
        }

        .note {
            font-size: 13px;
            color: #777;
            margin-top: 10px;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }

        @media only screen and (max-width: 500px) {
            .container {
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="container">

            <div class="logo">Explore-city</div>

            <div class="divider"></div>

            <div class="subtitle">Reset Your Password</div>

            <p>
                We received a request to reset your password. Click the button below to set a new password.
            </p>

            <a href="{{RESET_LINK}}" style="display: inline-block;padding: 14px 28px;font-size: 14px;font-weight: bold;color: #ffffff;text-decoration: none;
            background-color: #126877;border-radius: 6px;">Reset Password</a>

            <p class="note">
                If you did not request this, you can safely ignore this email.
            </p>

            <div class="footer">
                &copy; 2025 Explore-city. All rights reserved.
            </div>

        </div>
    </div>

</body>

</html>
