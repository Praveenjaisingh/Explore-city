<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Explore City</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Forgot Password?</h1>
      <p class="subtitle">Enter your email address to receive a reset link.</p>
      <form id="forgot-form">
        <input type="email" id="email" placeholder="Email Address" required />
        <button type="submit">Send Reset Link</button>
      </form>
      <p id="feedback" style="margin-top: 10px;"></p>

      <p style="margin-top: 15px;">
        Remember your password? <a href="index.html">Back to Login</a>
      </p>
    </div>
  </div>
<div id="loader" class="loader-overlay" style="display:none;">
  <div class="spinner"></div>
</div>


  <script>
    function showLoader() {
      document.getElementById("loader").style.display = "flex";
    }

    function hideLoader() {
      document.getElementById("loader").style.display = "none";
    }

    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("forgot-form");
      const feedback = document.getElementById("feedback");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();

        if (!email) {
          feedback.textContent = "Please enter your email.";
          feedback.style.color = "red";
          return;
        }

        try {
          showLoader();

          const response = await fetch("/api/users/forget-password", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
          });

          const data = await response.json();
          hideLoader();

          if (!response.ok) {
            throw new Error(data.message || "Something went wrong");
          }

          feedback.textContent = "Reset link sent to your email!";
          feedback.style.color = "green";

          setTimeout(() => {
            window.location.href = "forgetpasswordsuccess.html";
          }, 1500);

          form.reset();

        } catch (error) {
          hideLoader();
          feedback.textContent = error.message;
          feedback.style.color = "red";
        }
      });
    });
  </script>
</body>

</html>
