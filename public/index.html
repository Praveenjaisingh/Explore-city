<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore City</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- <h1>Welecome to Explore-city</h1> -->
  <div class="container">
    <div class="card login-form-section">
      <h1>Login</h1>

      <form>
        <input type="email" id="username" placeholder="Email" required>

        <div style="position: relative;">
          <input type="password" id="password" placeholder="Password" required>
          <span onclick="togglePassword('password', this)"
            style="position:absolute; right:10px; top:16px; cursor:pointer;">
            👁️
          </span>
        </div>

        <button type="submit">Login</button>
      </form>

      <p style="margin-top: 15px;">
        Don't have an account? <a href="register.html">Register</a><br>
        <a href="forget.html">Forgot Password?</a>
      </p>
    </div>

  </div>

  <script>
    function showToast(message, type) {
      let toast = document.getElementById("toast");

      if (!toast) {
        toast = document.createElement("div");
        toast.id = "toast";
        toast.style.marginTop = "10px";
        toast.style.padding = "10px";
        toast.style.borderRadius = "5px";
        toast.style.color = "white";
        toast.style.textAlign = "center";
        document.querySelector(".login-form-section").appendChild(toast);
      }

      toast.style.display = "block";
      toast.innerText = message;
      toast.style.background = type === "success" ? "green" : "red";

      setTimeout(() => {
        toast.style.display = "none";
      }, 3000);
    }

    function togglePassword(fieldId, el) {
      const input = document.getElementById(fieldId);

      if (input.type === "password") {
        input.type = "text";
        el.textContent = "🙈";
      } else {
        input.type = "password";
        el.textContent = "👁️";
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      console.log("JS Loaded ✅");

      const loginForm = document.querySelector('.login-form-section form');

      if (!loginForm) {
        console.error("Form not found ❌");
        return;
      }

      const submitBtn = loginForm.querySelector("button");

      loginForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        console.log("Form Submitted ✅");

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
          showToast("All fields are required", "error");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "Logging in...";

        try {
          console.log("Calling API...");

          const res = await fetch('/api/users/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email: username,
              password: password
            })
          });

          const data = await res.json();
          console.log("Backend Response:", data);

          if (data.status) {
            showToast(data.message || "Login successful", "success");
            localStorage.setItem("token", data.token);

            setTimeout(() => {
              window.location.href = "home.html";
            }, 1500);

          } else {
            showToast(data.errors || "Login failed", "error");
          }

        } catch (err) {
          console.error("Error:", err);
          showToast("Server error", "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = "Login";
        }
      });
    });
  </script>

</body>

</html>
