<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout - Explore City</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #cbe9f5, #eaf7fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card1 {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #0077b6;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="card1">
    <h2>You have been logged out</h2>
    <p>Thank you for using Explore City.</p>

    <p id="timerText"></p>

    <button onclick="goLogin()">Go to Login Page</button>
  </div>

  <script>
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
      history.go(1);
    };
    let seconds = 5;
    const timerText = document.getElementById("timerText");

    const interval = setInterval(() => {
      timerText.innerHTML = `Redirecting in <b>${seconds}</b> seconds...`;
      seconds--;

      if (seconds < 0) {
        clearInterval(interval);
        window.location.href = "index.html";
      }
    }, 1000);

    function goLogin() {
      window.location.href = "index.html";
    }
  </script>

</body>

</html>
