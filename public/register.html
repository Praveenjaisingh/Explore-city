<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Explore City</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="card register-form">
      <h1>Create Account</h1>
      <form>
        <input type="text" id="username" placeholder="Full Name" required>

        <input type="email" id="email" placeholder="Email" required>

        <div style="position: relative;">
          <input type="password" id="password" placeholder="Password" required>
          <span onclick="togglePassword('password', this)"
            style="position:absolute; right:10px; top:16px; cursor:pointer;">
            👁️
          </span>
        </div>

        <div style="position: relative;">
          <input type="password" id="confirm_password" placeholder="Confirm Password" required>
          <span onclick="togglePassword('confirm_password', this)"
            style="position:absolute; right:10px; top:16px; cursor:pointer;">
            👁️
          </span>
        </div>

        <button type="submit">Register</button>
      </form>

      <p style="margin-top: 15px;">
        Already have an account? <a href="index.html">Login</a>
      </p>
      <div id="loader" class="loader-overlay" style="display:none;">
        <div class="spinner"></div>
      </div>
    </div>

  </div>

  <script>
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
      history.go(1);
    };

    function showToast(message, type) {
      let toast = document.getElementById("toast");

      if (!toast) {
        toast = document.createElement("div");
        toast.id = "toast";
        toast.style.marginTop = "10px";
        toast.style.padding = "10px";
        toast.style.borderRadius = "5px";
        toast.style.color = "white";
        toast.style.textAlign = "center";
        document.querySelector(".register-form").appendChild(toast);
      }

      toast.style.display = "block";
      toast.innerText = message;
      toast.style.background = type === "success" ? "green" : "red";

      setTimeout(() => {
        toast.style.display = "none";
      }, 3000);
    }

    function togglePassword(fieldId, el) {
      const input = document.getElementById(fieldId);

      if (input.type === "password") {
        input.type = "text";
        el.textContent = "🙈";
      } else {
        input.type = "password";
        el.textContent = "👁️";
      }
    }

    function showLoader() {
      document.getElementById("loader").style.display = "flex";
    }

    function hideLoader() {
      document.getElementById("loader").style.display = "none";
    }

    document.addEventListener("DOMContentLoaded", function () {
      const registerForm = document.querySelector('.register-form form');

      if (!registerForm) {
        console.error("Form not found ❌");
        return;
      }

      registerForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirm_password').value.trim();

        if (!email || !username || !password || !confirmPassword) {
          showToast("All fields are required", "error");
          return;
        }

        if (password !== confirmPassword) {
          showToast("Passwords do not match", "error");
          return;
        }

        try {
          showLoader();

          const res = await fetch('/api/users/create', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name: username,
              email: email,
              password: password,
              confirmPassword: confirmPassword
            })
          });

          const data = await res.json();
          hideLoader();

          if (data.status) {
            showToast(data.message || "Registration successful", "success");

            setTimeout(() => {
              window.location.href = "index.html";
            }, 1500);

          } else {
            showToast(data.errors || "Registration failed", "error");
          }

        } catch (err) {
          hideLoader();
          console.error(err);
          showToast("Server error", "error");
        }
      });
    });
  </script>

</body>

</html>
