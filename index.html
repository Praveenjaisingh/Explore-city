<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore City</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    
    let currentUserEmail = "";
  
    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (email === dummyUser.email && password === dummyUser.password) {
        currentUserEmail = email;
        document.getElementById('welcomeUser').textContent = `Hello, ${email}`;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('homePage').classList.remove('hidden');
      } else {
        alert("Invalid credentials. Try user@example.com / 123456");
      }
    }
  
    function logout() {
      location.reload();
    }
  
    function getDistanceFromLatLon(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return (R * c).toFixed(2);
    }
  
    function showPlaces() {
      const filter = document.getElementById('searchInput').value.toLowerCase();
      const list = document.getElementById('placesList');
      list.innerHTML = "";
  
      places.forEach(place => {
        if (place.name.toLowerCase().includes(filter)) {
          const distance = userLat && userLng ? getDistanceFromLatLon(userLat, userLng, place.lat, place.lng) + " km" : "";
          const li = document.createElement('li');
          li.innerHTML = `<strong>${place.name}</strong> <br><small>${distance}</small>`;
          li.onclick = () => {
            const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLng}&destination=${place.lat},${place.lng}`;
            window.open(mapsUrl, '_blank');
          };
          list.appendChild(li);
        }
      });
    }
  </script>
  
      
</head>
<body>
  <div class="container" id="loginPage">
    <div class="card">
      <h1>Login</h1>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()"><a href="home.html" style="color: white;">Login</a></button>
      <p style="margin-top: 15px;">
        Don't have an account? <a href="register.html">Register</a><br>
        <a href="forget.html" >Forgot Password?</a>
      </p>
    </div>
  </div>

  
</body>
</html>
